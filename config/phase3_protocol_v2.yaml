version: 2
study: cross_market_momentum_phase3

source_runs_dir: results/baseline_grid_v5/runs
output_dir: results/phase3
markets_dir: markets
research_root: backtests/enhanced_momentum

primary_transaction_cost_bps:
  us: 25.0
  moex: 20.0
  crypto: 10.0

transaction_cost_sensitivity_bps:
  us: [0.0, 25.0]
  moex: [0.0, 10.0, 20.0]
  crypto: [0.0, 5.0, 10.0, 20.0]

annualization_days:
  us: 252
  moex: 252
  crypto: 365

retrospective_holdout:
  start: "2023-01-01"
  end: "2024-12-31"
  label: chronological_retrospective_holdout
  pristine_oos: false
  note: >-
    The holdout is excluded from algorithmic selection, but it is not described as
    fully pristine because full-sample baseline summaries through 2024 had already
    been inspected before the Phase 3 protocol correction.

folds:
  us:
    - name: us_f1
      train_start: "2010-01-01"
      train_end: "2014-12-31"
      test_start: "2015-01-01"
      test_end: "2015-12-31"
    - name: us_f2
      train_start: "2010-01-01"
      train_end: "2015-12-31"
      test_start: "2016-01-01"
      test_end: "2016-12-31"
    - name: us_f3
      train_start: "2010-01-01"
      train_end: "2016-12-31"
      test_start: "2017-01-01"
      test_end: "2017-12-31"
    - name: us_f4
      train_start: "2010-01-01"
      train_end: "2017-12-31"
      test_start: "2018-01-01"
      test_end: "2018-12-31"
    - name: us_f5
      train_start: "2010-01-01"
      train_end: "2018-12-31"
      test_start: "2019-01-01"
      test_end: "2019-12-31"
    - name: us_f6
      train_start: "2010-01-01"
      train_end: "2019-12-31"
      test_start: "2020-01-01"
      test_end: "2020-12-31"
    - name: us_f7
      train_start: "2010-01-01"
      train_end: "2020-12-31"
      test_start: "2021-01-01"
      test_end: "2021-12-31"
    - name: us_f8
      train_start: "2010-01-01"
      train_end: "2021-12-31"
      test_start: "2022-01-01"
      test_end: "2022-12-31"

  moex:
    - name: moex_f1
      train_start: "2013-01-01"
      train_end: "2016-12-31"
      test_start: "2017-01-01"
      test_end: "2018-12-31"
    - name: moex_f2
      train_start: "2013-01-01"
      train_end: "2018-12-31"
      test_start: "2019-01-01"
      test_end: "2020-12-31"
    - name: moex_f3
      train_start: "2013-01-01"
      train_end: "2020-12-31"
      test_start: "2021-01-01"
      test_end: "2021-12-31"
    - name: moex_f4
      train_start: "2013-01-01"
      train_end: "2021-12-31"
      test_start: "2022-01-01"
      test_end: "2022-12-31"

  crypto:
    - name: crypto_f1
      train_start: "2018-01-01"
      train_end: "2020-12-31"
      test_start: "2021-01-01"
      test_end: "2021-12-31"
    - name: crypto_f2
      train_start: "2019-01-01"
      train_end: "2021-12-31"
      test_start: "2022-01-01"
      test_end: "2022-12-31"

selection:
  primary_metric: net_sharpe
  rank_ascending: false
  top_fraction: 0.3333333333333333
  min_train_observations: 126
  min_test_observations: 60
  max_abs_return_correlation: 0.95
  max_ensemble_size: 3
  stable_criteria:
    median_train_rank_within_top_fraction: true
    median_test_rank_within_top_fraction: true
    min_test_top_fraction_share: 0.50
    min_positive_test_sharpe_share: 0.50
    max_median_absolute_rank_change_in_top_fraction_units: 1.0

known_exclusions:
  moex:
    moex_lb12M_sk0M_q10: known_sparse_signal_zero_target_caveat
    moex_lb12M_sk0M_q20: known_sparse_signal_zero_target_caveat
    moex_lb12M_sk0M_q30: known_sparse_signal_zero_target_caveat

protection:
  rolling_vol_window: 63
  volatility_quantile: 0.90
  variants:
    - no_protection
    - portfolio_vol_q90
    - market_vol_q90
    - combo_and_q90
  binary_risk_off_exposure: 0.0
  normal_exposure: 1.0
  switching_turnover_convention: half_l1
  crisis_windows:
    us:
      - name: covid_2020
        start: "2020-02-19"
        end: "2020-04-30"
      - name: us_bear_2022
        start: "2022-01-01"
        end: "2022-12-31"
    moex:
      - name: moex_structural_break_2022
        start: "2022-01-01"
        end: "2022-12-31"
    crypto:
      - name: crypto_selloff_2021
        start: "2021-05-01"
        end: "2021-07-31"
      - name: crypto_crisis_2022
        start: "2022-01-01"
        end: "2022-12-31"

interpretation_guardrails:
  - Negative results are valid research findings.
  - The holdout is never used to revise folds, stability rules, finalists, or protection thresholds.
  - Net Sharpe is the selection metric; benchmark-relative statistics are descriptive because the strategy is market-neutral while the benchmark is long-only.
  - No new protection window, quantile, or logical rule may be introduced after holdout inspection.
  - US and MOEX strategy returns remain price-return based; ordinary cash dividends are not included.
