market: moex
description: MOEX equities — liquid TQBR universe
api_base_url: https://iss.moex.com/iss
board: TQBR
data_dir: data/moex
market_proxy: IMOEX
universe:
  trading_days_window: 126
  min_trading_day_ratio: 0.5
  min_daily_volume_rub: 10000000
  exclude_tickers: []
rebal_freq: ME
hedge_instrument: null
walk_forward:
  folds:
  - train_start: '2010-01-01'
    train_end: '2015-12-31'
    test_start: '2016-01-01'
    test_end: '2017-12-31'
  - train_start: '2012-01-01'
    train_end: '2017-12-31'
    test_start: '2018-01-01'
    test_end: '2019-12-31'
  - train_start: '2014-01-01'
    train_end: '2019-12-31'
    test_start: '2020-01-01'
    test_end: '2021-12-31'
  - train_start: '2016-01-01'
    train_end: '2021-12-31'
    test_start: '2022-01-01'
    test_end: '2024-12-31'
  oos:
    start: '2022-01-01'
    end: '2024-12-31'
grid:
  quantile:
  - 0.2
  - 0.3
  - 0.4
  window_days:
  - 126
  - 252
  - 365
  exclude_last_days:
  - 21
  - 30
  volatility_scaling: true
  vol_window_days: 21
  return_type: simple
  mode: long_short
  weighting_scheme: equally_weighted
tc_bps:
- 10
- 20
results_dir: results/moex
caveats:
- MOEX ISS API may return unadjusted prices — dividend gaps not corrected
- Small universe (<50 liquid stocks) limits quantile-based sorting
- 2022 sanctions / structural break — treat as regime event, not outlier
start_date: '2010-01-01'
end_date: '2024-12-31'